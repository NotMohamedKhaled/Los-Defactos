<div class="p-6 bg-surface-container-lowest border border-border-subtle rounded-lg shadow-sm">
  <div class="mb-4 flex justify-between items-center border-b border-border-subtle pb-4">
    <h2 class="font-headline-md text-headline-md text-on-background">Manage FAQs</h2>
    <button type="button" class="bg-primary text-on-primary font-label-caps text-[14px] py-2 px-6 rounded-DEFAULT hover:bg-on-primary-fixed-variant transition-colors uppercase tracking-wider flex items-center gap-2" (click)="openAddModal()">
      <span class="material-symbols-outlined text-[18px]">add</span>
      Add FAQ
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center my-8">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
  </div>

  <div class="overflow-x-auto" *ngIf="!loading">
    <table class="w-full text-left border-collapse">
      <thead class="bg-surface-container-low font-label-caps text-label-caps text-on-surface-variant">
        <tr>
          <th class="p-4 border-b border-border-subtle w-1/3">Question</th>
          <th class="p-4 border-b border-border-subtle w-1/3">Answer</th>
          <th class="p-4 border-b border-border-subtle text-center">Status</th>
          <th class="p-4 border-b border-border-subtle text-right">Action</th>
        </tr>
      </thead>
      <tbody class="font-body-md text-body-md text-on-surface divide-y divide-border-subtle">
        <tr *ngFor="let faq of paginatedFaqs" class="hover:bg-surface-bright transition-colors group">
          <td class="p-4 font-semibold">{{ faq.question }}</td>
          <td class="p-4 text-on-surface-variant">{{ faq.answer }}</td>
          <td class="p-4 text-center">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider" [ngClass]="faq.isPosted ? 'bg-primary-fixed text-primary' : 'bg-surface-variant text-on-surface-variant'">{{ faq.isPosted ? 'Posted' : 'Draft' }}</span>
          </td>
          <td class="p-4 text-right">
            <button class="font-label-caps text-[12px] py-1 px-3 rounded-DEFAULT transition-colors uppercase tracking-wider" [ngClass]="faq.isPosted ? 'bg-surface-container-lowest text-sale-red border border-sale-red hover:bg-sale-red hover:text-white' : 'bg-surface-container-lowest text-primary border border-primary hover:bg-primary hover:text-on-primary'" (click)="togglePost(faq)">{{ faq.isPosted ? 'Unpost' : 'Post' }}</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-admin-pagination
    *ngIf="!loading"
    [page]="page"
    [pageSize]="pageSize"
    [totalItems]="faqs.length"
    (pageChange)="page = $event"
  />
</div>

<div *ngIf="showFormModal" class="admin-modal-backdrop" adminModalBackdrop (backdropClose)="closeAddModal()">
  <div class="admin-modal-panel admin-modal-panel--md p-6" (mousedown)="$event.stopPropagation()">
    <div class="mb-6 flex justify-between items-center border-b border-border-subtle pb-4">
      <h2 class="font-headline-md text-headline-md text-on-background">Add New FAQ</h2>
      <button type="button" class="text-on-surface-variant hover:text-on-surface p-1" (click)="closeAddModal()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <form [formGroup]="faqForm" (ngSubmit)="addFaq()" class="grid grid-cols-1 gap-4">
      <div>
        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1">Question</label>
        <input type="text" maxlength="200" formControlName="question" class="w-full px-4 py-2 border border-border-subtle rounded-DEFAULT bg-surface-bright focus:outline-none focus:border-primary font-body-md text-on-surface" placeholder="Question" [class.border-sale-red]="invalid('question')" />
        <app-form-field-error [control]="faqForm.get('question')"></app-form-field-error>
      </div>
      <div>
        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1">Answer</label>
        <textarea rows="4" maxlength="1000" formControlName="answer" class="w-full px-4 py-2 border border-border-subtle rounded-DEFAULT bg-surface-bright focus:outline-none focus:border-primary font-body-md text-on-surface" placeholder="Answer" [class.border-sale-red]="invalid('answer')"></textarea>
        <app-form-field-error [control]="faqForm.get('answer')"></app-form-field-error>
      </div>
      <div class="mt-2 flex justify-end gap-4">
        <button type="button" class="bg-surface-container-lowest text-on-surface-variant border border-border-subtle font-label-caps text-[14px] py-2 px-6 rounded-DEFAULT hover:bg-surface-variant transition-colors uppercase tracking-wider" (click)="closeAddModal()">Cancel</button>
        <button type="submit" class="bg-primary text-on-primary font-label-caps text-[14px] py-2 px-6 rounded-DEFAULT hover:bg-on-primary-fixed-variant transition-colors uppercase tracking-wider disabled:opacity-50" [disabled]="faqForm.invalid">Add FAQ</button>
      </div>
    </form>
  </div>
</div>
