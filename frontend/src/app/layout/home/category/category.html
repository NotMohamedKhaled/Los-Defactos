<a class="group relative block h-[400px] overflow-hidden rounded-DEFAULT cursor-pointer" routerLink="/products">
  <img [alt]="myCat.name" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" [src]="myCat.imgUrl | imageUrl" />
  <div class="absolute inset-0 bg-black/20 group-hover:bg-black/30 transition-colors duration-300"></div>
  <div class="absolute bottom-6 left-6 right-6 flex justify-between items-center bg-surface-container-lowest/90 backdrop-blur-sm p-4 rounded-DEFAULT">
    <span class="font-headline-md text-headline-md font-bold text-on-surface uppercase">{{ myCat.name }}</span>
    <span class="material-symbols-outlined text-primary">arrow_forward</span>
  </div>
</a>
